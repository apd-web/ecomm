version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/ecomm
      - CLIENT_ORIGIN=http://localhost:5173
    depends_on:
      - mongo
    ports:
      - "4000:4000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      - VITE_API_URL=http://localhost:4000/api/v1
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  mongo_data:
